name: Plugin CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  validate-and-package:
    name: Validate & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Validate plugin files
        run: php scripts/validate-plugin.php

      - name: Package plugin artifact
        run: bash scripts/package-plugin.sh

      - name: Show release checksum
        run: cat dist/streamarr.zip.sha256

      - name: Upload packaged plugin
        uses: actions/upload-artifact@v4
        with:
          name: streamarr-artifact
          path: |
            dist/streamarr.zip
            dist/streamarr.zip.sha256
