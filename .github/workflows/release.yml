name: Release Plugin

on:
  push:
    branches: [main]
    paths: ['Plugin.php', 'plugin.json']
  workflow_dispatch:
    inputs:
      bump:
        description: 'Override bump type (leave empty to auto-detect from commits)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip version-bump commits from the bot to prevent infinite loops
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Validate plugin
        run: |
          jq empty plugin.json
          echo "✓ plugin.json is valid JSON"
          php -l Plugin.php
          echo "✓ Plugin.php has no syntax errors"
          php scripts/validate-plugin.php

      - name: Determine bump type from commits
        id: bump
        run: |
          # Manual override takes priority
          MANUAL="${{ inputs.bump }}"
          if [ -n "$MANUAL" ]; then
            echo "type=$MANUAL" >> "$GITHUB_OUTPUT"
            echo "Bump type (manual override): $MANUAL"
            exit 0
          fi

          # Auto-detect from commit messages since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo '')
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:'%s' --no-merges)
          else
            COMMITS=$(git log --pretty=format:'%s' --no-merges)
          fi

          BUMP="none"

          # Check for breaking changes → major
          if echo "$COMMITS" | grep -qiE '^[a-z]+(\(.+\))?!:|BREAKING CHANGE'; then
            BUMP="major"
          # Check for feat: → minor
          elif echo "$COMMITS" | grep -qiE '^feat(\(.+\))?:'; then
            BUMP="minor"
          # Check for fix:/perf:/refactor: → patch
          elif echo "$COMMITS" | grep -qiE '^(fix|perf|refactor|style|build|ci|chore|docs|test)(\(.+\))?:'; then
            BUMP="patch"
          fi

          echo "type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Bump type (auto-detected): $BUMP"

      - name: Skip if no releasable commits
        if: steps.bump.outputs.type == 'none'
        run: echo "No releasable commits found — skipping release."

      - name: Compute new version
        id: version
        if: steps.bump.outputs.type != 'none'
        run: |
          CURRENT=$(jq -r '.version' plugin.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ steps.bump.outputs.type }}" in
            patch) NEW="$MAJOR.$MINOR.$((PATCH + 1))" ;;
            minor) NEW="$MAJOR.$((MINOR + 1)).0" ;;
            major) NEW="$((MAJOR + 1)).0.0" ;;
          esac

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
          echo "Version: $CURRENT → $NEW"

      - name: Generate changelog
        id: changelog
        if: steps.bump.outputs.type != 'none'
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo '')
          TAG="${{ steps.version.outputs.tag }}"

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:'%s' --no-merges | grep -v '^chore: bump version' || true)
          else
            COMMITS=$(git log --pretty=format:'%s' --no-merges | grep -v '^chore: bump version' || true)
          fi

          # Group commits by type
          FEATURES=$(echo "$COMMITS" | grep -iE '^feat(\(.+\))?:' | sed 's/^feat\([^)]*\)\?: *//' | sed 's/^/- /' || true)
          FIXES=$(echo "$COMMITS" | grep -iE '^fix(\(.+\))?:' | sed 's/^fix\([^)]*\)\?: *//' | sed 's/^/- /' || true)
          OTHERS=$(echo "$COMMITS" | grep -viE '^(feat|fix)(\(.+\))?:' | grep -v '^$' | sed 's/^[a-z]*\([^)]*\)\?: *//' | sed 's/^/- /' || true)

          {
            echo 'body<<CHANGELOG_EOF'
            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi
            if [ -n "$OTHERS" ]; then
              echo "### Other Changes"
              echo "$OTHERS"
              echo ""
            fi
            echo "## Install"
            echo ""
            echo '```bash'
            echo "php artisan plugins:stage-github-release \\"
            echo "  https://github.com/\${{ github.repository }}/releases/download/${TAG}/streamarr-${TAG}.zip \\"
            echo "  --sha256=\$(cat streamarr-${TAG}.zip.sha256)"
            echo '```'
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "**Full diff:** https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
            fi
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Bump version in plugin.json
        if: steps.bump.outputs.type != 'none'
        run: |
          jq --arg v "${{ steps.version.outputs.new }}" '.version = $v' plugin.json > plugin.json.tmp
          mv plugin.json.tmp plugin.json

      - name: Commit and tag
        if: steps.bump.outputs.type != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugin.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin HEAD "${{ steps.version.outputs.tag }}"

      - name: Package plugin
        if: steps.bump.outputs.type != 'none'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          bash scripts/package-plugin.sh "streamarr-${TAG}.zip"

      - name: Create GitHub Release
        if: steps.bump.outputs.type != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/streamarr-${{ steps.version.outputs.tag }}.zip
            dist/streamarr-${{ steps.version.outputs.tag }}.zip.sha256
